## 教师模块 (48条)

### 1.1 门户与登录

| 编号 | 测试场景 | 优先级 | 前置条件 | 测试步骤 | 预期结果 |
|------|---------|--------|---------|---------|---------|

| TC-T-LOGIN-004 | 教师退出登录 | P1 | 教师已登录 | 1.点击顶部头像下拉菜单 2.点击退出登录 | 成功退出跳转至门户未登录状态；顶部显示登录按钮 |

function parseTC(md){
  testCases=[];
  var cm='',cs='';
  var lines=md.split('\n');
  for(var i=0;i<lines.length;i++){
    var l=lines[i].trim();
    if(l.startsWith('## ')&&l.indexOf('### ')!==0){cm=l.replace('## ','').replace(/\(.*?\)/,'').trim()}
    else if(l.startsWith('### ')){cs=l.replace('### ','').trim()}
    else if(l.startsWith('| TC-')){
      var cols=l.split('|').map(function(x){return x.trim()}).filter(function(x){return x});
      if(cols.length>=6&&cols[0]!=='编号')testCases.push({id:cols[0],scenario:cols[1],priority:cols[2],precond:cols[3],steps:cols[4],expected:cols[5],module:cm,section:cs})
    }
  }
}
function parseBugs(md){
  // Legacy - bugs now come from GitHub Issues API
}
function parseGHIssues(issues){
  issues.forEach(function(iss){
    var cat = (iss.labels||[])[0]||'';
    var id = 'BUG-' + iss.number;
    var bg = {
      id: id,
      title: iss.title,
      desc: (iss.body||'').split('\n')[0].substring(0,200),
      severity: 'major',
      status: iss.state,
      createdAt: iss.created_at,
      html_url: iss.html_url,
      category: cat,
      number: iss.number
    };
    execData[id] = {bug: bg, result: 'fail'};
  });
}

function renderAll(){
  // Sidebar
  var mods={};
  testCases.forEach(function(tc){
    if(!mods[tc.module])mods[tc.module]=[];
    if(!mods[tc.module].some(function(s){return s.name===tc.section}))mods[tc.module].push({name:tc.section,id:'s-'+tc.section.replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g,'-')})
  });
  var nh='';
  for(var m in mods){
    var isT=m.indexOf('教师')>=0;
    nh+='<div class="ng">'+m+'</div>';
    mods[m].forEach(function(s){nh+='<a href="#'+s.id+'"><span class="dt '+(isT?'t':'s')+'"></span>'+s.name+'</a>'})
  }
  $('nav').innerHTML=nh;

  // Content
  var gs={};
  testCases.forEach(function(tc){var k=tc.module+'|||'+tc.section;if(!gs[k])gs[k]={module:tc.module,section:tc.section,cases:[]};gs[k].cases.push(tc)});
  var h='',lm='';
  for(var k in gs){
    var g=gs[k];
    if(g.module!==lm){if(lm)h+='</div>';var isT=g.module.indexOf('教师')>=0;h+='<div class="sc"><h2>'+g.module+' <span class="badge '+(isT?'t':'s')+'">'+(isT?'Teacher':'Student')+'</span></h2><div class="desc">'+(isT?'教师负责创建和管理教学实验、克隆实验、编排云端实验室内容。':'学生通过LMS进入实验进行操作，完成交互任务、编程项目等。')+'</div>';lm=g.module}
    var sid='s-'+g.section.replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g,'-');
    h+='<div class="fg" id="'+sid+'"><h3>'+g.section+' ('+g.cases.length+'条)</h3><div class="tw"><table><thead><tr><th style="width:90px">编号</th><th>测试场景</th><th style="width:60px">优先级</th><th>前置条件</th><th>测试步骤</th><th>预期结果</th></tr></thead><tbody>';
    g.cases.forEach(function(tc){h+='<tr data-tc="'+tc.id+'"><td class="id">'+tc.id+'</td><td class="sc-t">'+tc.scenario+'</td><td><span class="pri '+tc.priority.toLowerCase()+'">'+tc.priority+'</span></td><td>'+tc.precond+'</td><td>'+tc.steps+'</td><td>'+tc.expected+'</td></tr>'});
    h+='</tbody></table></div></div>'
  }
  h+='</div>';
  $('content').innerHTML=h;

  // Stats
  var tc=testCases.filter(function(x){return x.module.indexOf('教师')>=0}).length;
  var sc=testCases.filter(function(x){return x.module.indexOf('学生')>=0}).length;
  $('stats').innerHTML='<div class="n">'+testCases.length+'</div><div class="l">用例总数</div><div style="display:flex;justify-content:space-around;margin-top:4px"><div><span class="n" style="color:var(--t);font-size:18px">'+tc+'</span><span class="l">教师</span></div><div><span class="n" style="color:var(--s);font-size:18px">'+sc+'</span><span class="l">学生</span></div></div>';

  renderBugList();
  renderRps();
}

// ---- EXECUTION MODE ----
window.toggleMode=function(){
  execMode=!execMode;
  if(execMode){
    document.body.classList.add('em');
    $('rs').value=rounds;
    $('mt').children[0].classList.remove('ac');
    $('mt').children[1].classList.add('ac');
    buildExec();updateProgress();
  }else{
    document.body.classList.remove('em');
    $('mt').children[0].classList.add('ac');
    $('mt').children[1].classList.remove('ac');
    removeExec();
  }
  saveExec();
}

function buildExec(){
  if(!execMode)return;
  // Add header columns
  var theads=document.querySelectorAll('thead tr');
  for(var i=0;i<theads.length;i++){
    var tr=theads[i];
    var ecs=tr.querySelectorAll('th.ec,th.rc');
    for(var j=0;j<ecs.length;j++)ecs[j].remove();
    for(var r=1;r<=rounds;r++){var th=document.createElement('th');th.className='ec';th.textContent='R'+r;tr.appendChild(th)}
    var th=document.createElement('th');th.className='rc';th.textContent='结果';tr.appendChild(th)
  }
  // Add body columns
  var rows=document.querySelectorAll('tbody tr[data-tc]');
  for(var i=0;i<rows.length;i++){
    (function(row){
      var tcId=row.dataset.tc;
      var ecs=row.querySelectorAll('td.ec,td.rc');
      for(var j=0;j<ecs.length;j++)ecs[j].remove();
      var d=execData[tcId]||{};
      for(var r=1;r<=rounds;r++){
        var td=document.createElement('td');td.className='ec';
        td.innerHTML='<input type="checkbox" data-tc="'+tcId+'" data-r="'+r+'"'+(d['r'+r]?' checked':'')+' onchange="onCheck(this)">';
        row.appendChild(td)
      }
      var td=document.createElement('td');td.className='rc';
      var cr=d.result||'';
      var ops=[['','未标记'],['pass','✅通过'],['fail','❌失败'],['blocked','⊘阻塞'],['skip','→跳过']];
      var s='<select data-tc="'+tcId+'" onchange="onResult(this)">';
      ops.forEach(function(o){s+='<option value="'+o[0]+'"'+(cr===o[0]?' selected':'')+'>'+o[1]+'</option>'});
      s+='</select>';
      var hb=d.bug&&d.bug.title;
      s+='<button class="bbtn'+(hb?' hb':'')+'" style="display:'+(cr==='fail'?'':'none')+'" onclick="event.stopPropagation();openBug(\''+tcId+'\')">🐛</button>';
      if(hb){var st=d.bug.status||'open',lb={open:'打开',fixing:'修复中',fixed:'已修复',verified:'已验证',closed:'已关闭'};s+='<span class="bb '+st+'">'+(lb[st]||'')+'</span>'}
      td.innerHTML=s;row.appendChild(td);
      setRowClass(row,cr)
    })(rows[i])
  }
}

function removeExec(){
  var ecs=document.querySelectorAll('th.ec,th.rc,td.ec,td.rc');
  for(var i=0;i<ecs.length;i++)ecs[i].remove();
  var rows=document.querySelectorAll('tr[data-tc]');
  for(var i=0;i<rows.length;i++)rows[i].className=''
}

function setRowClass(row,r){
  row.classList.remove('rp','rf','rb','rs');
  if(r==='pass')row.classList.add('rp');
  else if(r==='fail')row.classList.add('rf');
  else if(r==='blocked')row.classList.add('rb');
  else if(r==='skip')row.classList.add('rs')
}

window.onCheck=function(cb){if(!execData[cb.dataset.tc])execData[cb.dataset.tc]={};execData[cb.dataset.tc]['r'+cb.dataset.r]=cb.checked;saveExec();updateProgress()}
window.onResult=function(sel){
  if(!execData[sel.dataset.tc])execData[sel.dataset.tc]={};
  execData[sel.dataset.tc].result=sel.value;
  var row=document.querySelector('tr[data-tc="'+sel.dataset.tc+'"]');
  if(row){setRowClass(row,sel.value);var bb=row.querySelector('.bbtn');if(bb)bb.style.display=sel.value==='fail'?'':'none'}
  if(sel.value!=='fail'&&execData[sel.dataset.tc].bug){delete execData[sel.dataset.tc].bug;removeExec();buildExec()}
  saveExec();updateProgress()
}
window.onRoundsChange=function(){rounds=parseInt($('rs').value);removeExec();buildExec();saveExec();updateProgress()}

function updateProgress(){
  var rows=document.querySelectorAll('tr[data-tc]');
  var t=rows.length*rounds,c=0,p=0,f=0,bg=0;
  for(var i=0;i<rows.length;i++){
    var d=execData[rows[i].dataset.tc]||{};
    for(var r=1;r<=rounds;r++)if(d['r'+r])c++;
    if(d.result==='pass')p++;else if(d.result==='fail')f++;
    if(d.bug&&d.bug.title)bg++
  }
  var pct=t>0?Math.round(c/t*100):0;
  $('pf').style.width=pct+'%';$('pt').textContent=c+'/'+t;
  $('xp').textContent=c+'/'+t;$('xpa').textContent=p;$('xfa').textContent=f;$('xbg').textContent=bg
}

function saveExec(){localStorage.setItem('ulab-exec',JSON.stringify({rounds:rounds,results:execData}));localStorage.setItem('ulab-mode',execMode?'exec':'view')}
window.clearExec=function(){if(!confirm('确定清除所有执行记录？'))return;execData={};localStorage.removeItem('ulab-exec');removeExec();buildExec();saveExec();updateProgress()}

window.openBug=function(tcId){
  var bg=(execData[tcId]||{}).bug;
  if(bg&&bg.html_url) window.open(bg.html_url, '_blank');
}

function allBugs(){
  var a=[];
  for(var id in execData){var d=execData[id];if(d.bug&&d.bug.title)a.push({tcId:id,title:d.bug.title,desc:d.bug.desc,severity:d.bug.severity,status:d.bug.status,createdAt:d.bug.createdAt,attachments:d.bug.attachments})}
  return a
}

window.renderBugList=function(){
  var all=allBugs();
  var sf=$('bfs').value,stf=$('bfst').value;
  if(sf!=='all')all=all.filter(function(b){return b.category===sf});
  if(stf!=='all')all=all.filter(function(b){return b.status===stf});
  var total=allBugs().length;
  $('bmc').textContent=total>0?'（'+total+'个）':'';
  var tb=$('blb');
  if(!all.length){tb.innerHTML='<tr class="em"><td colspan="5">'+(total>0?'没有匹配的Bug':'加载中...')+'</td></tr>';return}
  all.sort(function(a,b){return (b.number||0)-(a.number||0)});
  tb.innerHTML=all.map(function(b){
    var t=b.createdAt?new Date(b.createdAt).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}):'-';
    var catLabel = b.category||'';
    var statusLabel = b.status==='open'?'打开':'已关闭';
    var statusClass = b.status==='open'?'op':'cl';
    return'<tr><td style="font-family:monospace;font-size:11px;color:var(--p)">#'+b.number+'</td><td><a href="'+b.html_url+'" target="_blank" style="color:var(--p);text-decoration:none">'+b.title+'</a></td><td><span class="sb-b '+(b.severity||'mn')+'">'+catLabel+'</span></td><td><span class="bb '+statusClass+'">'+statusLabel+'</span></td><td style="font-size:11px;color:var(--mu)">'+t+'</td></tr>'
  }).join('')
}

        parseTC(ev.target.result);renderAll();
        showToast('✅ 已加载 test-cases.md ('+testCases.length+'条)')
      }else if(f.name.includes('bug')||f.name.includes('Bug')){
        parseBugs(ev.target.result);renderBugList();
        showToast('✅ 已加载 bugs.md ('+allBugs().length+'个Bug)')
      }
    };
    reader.readAsText(f)
  }
};

// ---- REPORT ----
window.genReport=function(){
  var allBgs=allBugs(),rows=document.querySelectorAll('tr[data-tc]');
  var st={total:rows.length,pass:0,fail:0,blocked:0,skip:0,unmarked:0};
  var det=[];
  for(var i=0;i<rows.length;i++){var d=execData[rows[i].dataset.tc]||{},r=d.result||'';st[r||'unmarked']++;det.push({id:rows[i].dataset.tc,scenario:(rows[i].querySelector('.sc-t')||{}).textContent||'',priority:(rows[i].querySelector('.pri')||{}).textContent||'-',result:r})}
  var pr=st.total>0?Math.round((st.pass+st.skip)/st.total*100):0,now=new Date().toLocaleString('zh-CN');
  var h='<div class="rsm">';
  h+='<div class="rc-card"><div class="cn" style="color:var(--p)">'+st.total+'</div><div class="cl">总数</div></div>';
  h+='<div class="rc-card"><div class="cn" style="color:#198754">'+st.pass+'</div><div class="cl">✅通过</div></div>';
  h+='<div class="rc-card"><div class="cn" style="color:var(--hi)">'+st.fail+'</div><div class="cl">❌失败</div></div>';
  h+='<div class="rc-card"><div class="cn" style="color:var(--md)">'+st.blocked+'</div><div class="cl">⊘阻塞</div></div>';
  h+='<div class="rc-card"><div class="cn" style="color:var(--lo)">'+st.skip+'</div><div class="cl">→跳过</div></div>';
  h+='<div class="rc-card"><div class="cn" style="color:var(--p);font-size:24px">'+pr+'%</div><div class="cl">通过率</div></div>';
  h+='<div class="rc-card"><div class="cn" style="color:var(--hi)">'+allBgs.length+'</div><div class="cl">🐛Bug</div></div>';
  h+='</div><p style="font-size:12px;color:var(--mu)">轮次:第'+rounds+'轮 | 时间:'+now+'</p>';
  var rl={pass:'✅通过',fail:'❌失败',blocked:'⊘阻塞',skip:'→跳过','':'未标记'};
  ['教师模块','学生模块'].forEach(function(mod){
    var md=det.filter(function(d){return testCases.some(function(tc){return tc.id===d.id&&tc.module.indexOf(mod)>=0})});
    if(!md.length)return;
    h+='<div class="rst">'+mod+'</div><table class="rtb"><thead><tr><th>编号</th><th>场景</th><th>优先级</th><th>结果</th></tr></thead><tbody>';
    md.forEach(function(d){var bgc=d.result||'skip',bg=(execData[d.id]||{}).bug;h+='<tr><td style="font-family:monospace;font-size:11px;color:var(--p)">'+d.id+'</td><td>'+d.scenario+'</td><td>'+d.priority+'</td><td><span class="rbd '+bgc+'">'+(rl[d.result]||'未标记')+'</span>';if(bg&&bg.title)h+='<div class="bi">🐛'+bg.title+'</div>';h+='</td></tr>'});
    h+='</tbody></table>'
  });
  $('rb').innerHTML=h;$('ro').classList.add('sh')
}
window.closeRp=function(){$('ro').classList.remove('sh')}
window.saveRp=function(){
  var rc=$('rb').innerHTML,ds=new Date().toISOString().slice(0,10);
  var h='<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>ULab-I期测试报告</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:#333;max-width:960px;margin:0 auto;padding:24px}h1{font-size:24px;border-bottom:2px solid #1a73e8;padding-bottom:8px}.rsm{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin:16px 0 24px}.rc-card{text-align:center;padding:14px;border-radius:10px;background:#f8f9fa}.rc-card .cn{font-size:28px;font-weight:700}.rc-card .cl{font-size:11px;color:#666}.rtb{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0 16px}.rtb th{background:#f1f3f4;padding:8px 10px;text-align:left;font-weight:600;font-size:11px;color:#5f6368;border-bottom:2px solid #dadce0}.rtb td{padding:7px 10px;border-bottom:1px solid #f0f0f0}.rbd{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}.rbd.pa{background:#e6f4ea;color:#198754}.rbd.fa{background:#fce8e6;color:#dc3545}.rbd.bl{background:#fef7e0;color:#fd7e14}.rbd.sk{background:#e8eaed;color:#6c757d}.bi{font-size:11px;padding:4px 8px;margin-top:4px;background:#fef7e0;border-radius:4px;border-left:3px solid #fd7e14}.rst{font-size:15px;font-weight:700;margin:20px 0 8px;padding-bottom:6px;border-bottom:1px solid #e0e0e0}</style></head><body><h1>📊ULab-I期测试执行报告</h1><p style="font-size:12px;color:#666">'+ds+' | 第'+rounds+'轮</p>'+rc+'</body></html>';
  var b=new Blob([h],{type:'text/html;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='ULab-测试报告_'+ds+'.html';a.click();
  var reps=JSON.parse(localStorage.getItem('ulab-reports')||'[]');reps.unshift({name:'ULab-测试报告_'+ds+'.html',date:ds,html:h,rounds:rounds});if(reps.length>10)reps.length=10;localStorage.setItem('ulab-reports',JSON.stringify(reps));renderRps()
}

// ---- REPORTS ----
function renderRps(){var reps=JSON.parse(localStorage.getItem('ulab-reports')||'[]'),c=$('rpl'),n=$('rpst').querySelector('.nr');if(!reps.length){n.style.display='block';c.innerHTML='';return}n.style.display='none';c.innerHTML=reps.map(function(r,i){return'<div class="rl"><span onclick="openRp('+i+')">📄'+r.name.replace('.html','')+'</span><span style="color:var(--hi);cursor:pointer;font-size:14px;opacity:.5" onclick="event.stopPropagation();delRp('+i+')">×</span></div>'}).join('')}
window.openRp=function(i){var reps=JSON.parse(localStorage.getItem('ulab-reports')||'[]');if(!reps[i])return;var u=URL.createObjectURL(new Blob([reps[i].html],{type:'text/html'}));window.open(u,'_blank')}
window.delRp=function(i){var reps=JSON.parse(localStorage.getItem('ulab-reports')||'[]');reps.splice(i,1);localStorage.setItem('ulab-reports',JSON.stringify(reps));renderRps()}

// ---- UTILS ----
function showToast(m){var t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(function(){t.remove()},2500)}
document.addEventListener('keydown',function(e){if(e.key!=='Escape')return;if($('ro').classList.contains('sh'))closeRp()})
$('nav').addEventListener('click',function(e){var a=e.target.closest('a');if(!a)return;e.preventDefault();var t=document.querySelector(a.getAttribute('href'));if(t)t.scrollIntoView({behavior:'smooth'})})

renderRps();
init().catch(function(e){
  document.body.innerHTML='<div style="padding:40px;color:#dc3545"><h2>❌ 错误</h2><p>'+e.message+'</p><pre style="background:#fce8e6;padding:12px;font-size:11px;overflow:auto;max-height:300px">'+e.stack+'</pre></div>'
});
</script>
